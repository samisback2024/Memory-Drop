         action item, not done here since guessing a domain would be
         worse than leaving it relative. -->

    <meta property="og:site_name" content="Memory Drop" />
    <meta property="og:title" content="Memory Drop" />
    <meta property="og:description" content="Capture today. Unlock tomorrow. Memory Drop is a time-capsule social app." />
    <meta property="og:image" content="/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Memory Drop" />
